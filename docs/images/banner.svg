<svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#09090f"/>
      <stop offset="100%" stop-color="#0e0e1a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="75%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="30%" r="40%">
      <stop offset="0%"  stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)" rx="8"/>
  <rect width="1200" height="200" fill="url(#glow1)" rx="8"/>
  <rect width="1200" height="200" fill="url(#glow2)" rx="8"/>

  <!-- Grid lines -->
  <g opacity="0.12" stroke="#1e1e3a" stroke-width="0.5">
    <line x1="0"    y1="40"  x2="1200" y2="40"/>
    <line x1="0"    y1="80"  x2="1200" y2="80"/>
    <line x1="0"    y1="120" x2="1200" y2="120"/>
    <line x1="0"    y1="160" x2="1200" y2="160"/>
    <line x1="100"  y1="0"   x2="100"  y2="200"/>
    <line x1="300"  y1="0"   x2="300"  y2="200"/>
    <line x1="500"  y1="0"   x2="500"  y2="200"/>
    <line x1="700"  y1="0"   x2="700"  y2="200"/>
    <line x1="900"  y1="0"   x2="900"  y2="200"/>
    <line x1="1100" y1="0"   x2="1100" y2="200"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="200" fill="#00e5ff" opacity="0.8" rx="2"/>

  <!-- Label -->
  <text x="40" y="55" font-size="11" letter-spacing="4" fill="#00e5ff" opacity="0.9" font-weight="bold">IEEE 1588-2008 · SMPTE ST 2059-2 · PROAV</text>

  <!-- Main title -->
  <text x="40" y="115" font-size="48" font-weight="900" fill="#e2e8f0" letter-spacing="-1">PTP Slave Clock</text>
  <text x="40" y="163" font-size="48" font-weight="900" letter-spacing="-1">
    <tspan fill="#e2e8f0">Sync</tspan>
    <tspan fill="#00e5ff"> IP</tspan>
    <tspan fill="#64748b" font-size="22" font-weight="400" letter-spacing="0"> — SystemVerilog RTL · Sub-100 ns Accuracy</tspan>
  </text>

  <!-- Right side circuit decoration -->
  <g opacity="0.3" stroke="#00e5ff" stroke-width="1" fill="none">
    <circle cx="1100" cy="60"  r="20"/>
    <circle cx="1100" cy="60"  r="12"/>
    <circle cx="1100" cy="60"  r="4" fill="#00e5ff"/>
    <line x1="1120" y1="60"  x2="1160" y2="60"/>
    <line x1="1080" y1="60"  x2="1040" y2="60"/>
    <line x1="1100" y1="40"  x2="1100" y2="20"/>
    <line x1="1100" y1="80"  x2="1100" y2="100"/>

    <circle cx="1150" cy="140" r="14"/>
    <circle cx="1150" cy="140" r="6"/>
    <circle cx="1150" cy="140" r="2" fill="#7c3aed" stroke="#7c3aed"/>
    <line x1="1164" y1="140" x2="1190" y2="140"/>
    <line x1="1136" y1="140" x2="1110" y2="140"/>
  </g>

  <!-- Corner timestamp -->
  <text x="1160" y="185" font-size="9" fill="#374151" text-anchor="end" letter-spacing="1">v1.0 · RTL</text>
</svg>
